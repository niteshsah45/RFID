<!DOCTYPE html>
<html>
<head>
  <title>Student Attendance</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .subject-card {
      background: #f9fafb;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .percent {
      color: green;
      font-weight: bold;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Student Attendance</h2>

    <input id="student-id" placeholder="Enter Student ID (S001)" />
    <button id="check-btn">Check Attendance</button>

    <div id="result"></div>
  </div>

  <script type="module" src="./rfidstudent.js"></script>

</body>
</html>
